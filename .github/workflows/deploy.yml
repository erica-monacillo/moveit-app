name: CI/CD Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  test-build-deploy:
    name: Test, Build, Deploy, and Smoke Test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run basic test
        run: |
          echo "Running basic CI test..."
          test -f public/index.html
          grep -q "MoveIt App" public/index.html

      - name: Build static site
        run: |
          echo "Preparing static site build..."
          mkdir -p dist
          cp -r public/* dist/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed homepage
        run: |
          echo "Checking deployed site..."
          curl -I "${{ steps.deployment.outputs.page_url }}"
          curl -L "${{ steps.deployment.outputs.page_url }}" | grep -q "MoveIt App"